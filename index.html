<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfume Sun - کارت ویزیت هوشمند</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Tahoma, Arial, sans-serif;
        }
        body {
            background: #0f111a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        /* نگهدارنده کارت متناسب با ابعاد کارت ویزیت افقی */
        .card-container {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 16 / 9;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 25px;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* چرخیدن کارت حول محور عمودی */
        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.2); /* هماهنگ با تم طلایی کارت */
        }

        .card-face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        /* متن راهنمای انیمیشنی */
        .hint {
            font-size: 15px;
            color: #d4af37; /* رنگ طلایی هماهنگ با کارت */
            margin-bottom: 35px;
            font-weight: bold;
            letter-spacing: 0.5px;
            animation: pulse 2s infinite ease-in-out;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        /* دکمه شیک تلگرام با تم طلایی/آبی مایل به تیره */
        .btn-telegram {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #0088cc, #005580);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 136, 204, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-telegram:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.6);
        }

        .btn-telegram svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <!-- بخش کارت با قابلیت چرخش با ضربه -->
    <div class="card-container" onclick="toggleCard(this)">
        <div class="card-inner">
            <!-- روی کارت (لوگو) -->
            <div class="card-face card-front">
                <img src="front.jpg" alt="روی کارت - Perfume Sun">
            </div>
            <!-- پشت کارت (اطلاعات تماس) -->
            <div class="card-face card-back">
                <img src="back.jpg" alt="پشت کارت - Perfume Sun">
            </div>
        </div>
    </div>

    <!-- راهنمای چرخاندن کارت -->
    <div class="hint">برای چرخاندن کارت روی آن ضربه بزنید</div>

    <!-- دکمه ورود به کانال تلگرام -->
    <a href="https://t.me/perfumeSun2014" target="_blank" class="btn-telegram">
        <!-- آیکون SVG تلگرام برای زیبایی بیشتر دکمه -->
        <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-1-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.11.02-1.93 1.23-5.46 3.62-.51.35-.98.53-1.39.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.46-.42-1.4-.88.03-.24.37-.49 1.02-.75 4-.1.74 1.7 5.75 3.38.22.07.46.14.71.21.75.2 1.43.38 1.96.34.49-.04 1.4-.42 1.6-.98.2-.56.2-1.05.14-1.15-.06-.1-.21-.16-.43-.27z"/>
        </svg>
        ورود به کانال تلگرام Perfume Sun
    </a>

    <script>
        function toggleCard(card) {
            card.classList.toggle('flipped');
        }
    </script>
</body>
</html>
